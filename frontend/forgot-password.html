<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Forgot Password</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        body {
            background-color: #faf9fe;
            font-family: 'Inter', sans-serif;
        }

        .adventure-shadow {
            box-shadow: 0 20px 25px -5px rgba(0, 88, 188, 0.1),
                        0 8px 10px -6px rgba(0, 88, 188, 0.05);
        }
    </style>
</head>

<body class="min-h-screen flex flex-col">

<main class="flex-grow flex items-center justify-center p-6 relative overflow-hidden">

    <!-- Background effects -->
    <div class="absolute top-[-10%] right-[-5%] w-[400px] h-[400px] rounded-full bg-blue-500/5 blur-3xl"></div>
    <div class="absolute bottom-[-10%] left-[-5%] w-[300px] h-[300px] rounded-full bg-orange-500/5 blur-3xl"></div>

    <div class="w-full max-w-md z-10">

        <!-- Logo -->
        <div class="flex flex-col items-center mb-12">
            <div class="w-16 h-16 bg-[#0058bc] rounded-xl flex items-center justify-center adventure-shadow mb-4">
                <span class="material-symbols-outlined text-white text-4xl">lock_reset</span>
            </div>
            <h1 class="text-4xl font-bold text-[#1a1b1f] tracking-tight">Reset Password</h1>
            <p class="text-slate-500 mt-2 text-center">
                Enter your email to receive a reset link
            </p>
        </div>

        <!-- Card -->
        <div class="bg-white rounded-[1.5rem] p-10 adventure-shadow border border-slate-100">

            <form id="forgotForm" class="space-y-6">

                <div class="space-y-2">
                    <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider">
                        Email
                    </label>
                    <input
                        id="email"
                        type="email"
                        placeholder="example@email.com"
                        required
                        class="w-full px-4 py-3 rounded-lg border border-slate-200 bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-[#0058bc] transition-all"
                    />
                </div>

                <div class="pt-2">
                    <button
                        type="submit"
                        class="w-full py-4 bg-[#0058bc] text-white rounded-xl font-semibold hover:bg-[#004493] active:scale-[0.98] transition-all adventure-shadow"
                    >
                        Send Reset Link
                    </button>
                </div>

            </form>

            <p id="message" class="mt-4 text-sm text-center"></p>

            <p class="mt-8 text-center text-sm text-slate-500">
                Remember your password?
                <a href="login.html" class="text-[#0058bc] font-semibold hover:underline">
                    Back to login
                </a>
            </p>

        </div>
    </div>
</main>

<footer class="w-full py-8 px-6">
    <div class="max-w-7xl mx-auto text-center">
        <p class="text-xs text-slate-400">© 2026 Smart Travel Planner.</p>
    </div>
</footer>

<script src="js/forgot-password.js"></script>

</body>
</html>
