<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Edit Profile</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #faf9fe; }
    </style>
</head>
<body class="flex">
    <aside class="fixed left-0 top-0 h-screen w-64 border-r bg-white border-slate-200 shadow-xl shadow-blue-500/5 flex flex-col p-4 gap-2 z-50">
        <div class="mb-8 px-4 py-6">
            <h1 class="text-2xl font-black text-blue-600">SmartTravel</h1>
            <p class="text-sm text-slate-400">Smart Planner</p>
        </div>
        <nav class="flex flex-col gap-1 grow">
            <a class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:text-blue-500 hover:bg-slate-50 rounded-lg transition-all" href="dashboard.html">
                <span class="material-symbols-outlined">home</span>
                <span>My Trips</span>
            </a>
            <a class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:text-blue-500 hover:bg-slate-50 rounded-lg transition-all" href="create-trip.html">
                <span class="material-symbols-outlined">add_circle</span>
                <span>Plan New Trip</span>
            </a>
            <a class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:text-blue-500 hover:bg-slate-50 rounded-lg transition-all" href="currency-converter.html">
                <span class="material-symbols-outlined">currency_exchange</span>
                <span>Currency Converter</span>
            </a>
        </nav>
        <button onclick="logout()" class="flex items-center gap-3 px-4 py-3 text-red-500 hover:bg-red-50 rounded-lg transition-all mt-4">
                <span class="material-symbols-outlined">logout</span>
                <span>Logout</span>
        </button>
    </aside>

    <main class="flex-1 ml-64 p-12">
        <div class="max-w-1xl mx-auto">
            <header class="mb-10">
                <h1 class="text-3xl font-black text-slate-900">Profile</h1>
                <p class="text-slate-500">View or update your profile details.</p>
            </header>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-start">

                <!-- LEFT SIDE -->
                <div class="space-y-6">

                    <!-- USER SUMMARY BOX -->
                    <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-100 flex items-center gap-4">
                        <div id="profileSummaryIcon" class="h-14 w-14 rounded-full bg-blue-100 flex items-center justify-center text-blue-600 font-black text-xl uppercase">
                            U
                        </div>

                        <div>
                            <p class="text-sm text-slate-400 font-semibold">Signed in as</p>
                            <h2 id="profileSummaryName" class="text-xl font-black text-slate-900">User Name</h2>
                        </div>
                    </div>

                    <!-- PROFILE FORM -->
                    <form id="editProfileForm" class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 space-y-6">
                        <div>
                            <h2 class="text-lg font-black text-slate-900">Profile Details</h2>
                            <p class="text-sm text-slate-500 mt-1">Update your name and email.</p>
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">User Name</label>
                            <input type="text" id="profileName" required class="w-full rounded-xl border-slate-200" placeholder="Enter your name">
                        </div>

                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">Email</label>
                            <input type="email" id="profileEmail" required class="w-full rounded-xl border-slate-200" placeholder="Enter your email">
                        </div>

                        <div class="pt-4 flex gap-4">
                            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition-all">
                                Save Profile
                            </button>
                            <button type="button" onclick="history.back()" class="px-8 py-4 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200 transition-all">
                                Cancel
                            </button>
                        </div>
                    </form>
                </div>


                <!-- RIGHT BOX: Password -->
                <form id="changePasswordForm" class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 space-y-6">
                    <div>
                        <h2 class="text-lg font-black text-slate-900">Change Password</h2>
                        <p class="text-sm text-slate-500 mt-1">Verify your current password first.</p>
                    </div>

                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Old Password</label>
                        <input type="password" id="oldPassword" class="w-full rounded-xl border-slate-200" placeholder="Enter old password">
                    </div>

                    <button type="button" id="verifyPasswordBtn" class="w-full bg-slate-900 text-white font-bold py-4 rounded-xl hover:bg-slate-800 transition-all">
                        Verify Password
                    </button>

                    <div id="newPasswordSection" class="hidden space-y-6 pt-4 border-t border-slate-100">
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">New Password</label>
                            <input type="password" id="newPassword" class="w-full rounded-xl border-slate-200" placeholder="Enter new password">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-slate-700 mb-2">Confirm New Password</label>
                            <input type="password" id="confirmPassword" class="w-full rounded-xl border-slate-200" placeholder="Confirm new password">
                        </div>
                        
                        <div class="pt-4 flex gap-4">
                            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition-all">
                                Update Password
                            </button>
                            <button type="button" id="cancelPasswordBtn" class="px-8 py-4 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200 transition-all">
                                Cancel
                            </button>
                        </div>
                        
                    </div>
                </form>

            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
