<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Holiday Explorer - Smart Travel Planner</title>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css">

    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#0058bc",
                        "secondary-container": "#fe9400",
                        "background": "#faf9fe",
                    }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #faf9fe; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .adventure-shadow {
            box-shadow: 0 10px 25px -5px rgba(0, 88, 188, 0.15);
        }
    </style>
</head>

<body class="bg-background text-slate-900 min-h-screen flex">

<!-- SIDEBAR (MATCHING TEAMMATE STYLE EXACTLY) -->
<aside class="fixed left-0 top-0 h-screen w-64 border-r bg-white border-slate-200 shadow-xl shadow-blue-500/5 flex flex-col p-4 gap-2 z-50">

    <div class="mb-8 px-4 py-6">
        <h1 class="text-2xl font-black text-blue-600">SmartTravel</h1>
        <p class="text-sm text-slate-400">Smart Planner</p>
    </div>

    <nav class="flex flex-col gap-1 grow">

        <!-- My Trips -->
        <a class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:text-blue-500 hover:bg-slate-50 rounded-lg transition-all"
           href="dashboard.html">
            <span class="material-symbols-outlined">home</span>
            <span>My Trips</span>
        </a>

        <!-- Plan New Trip -->
        <a class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:text-blue-500 hover:bg-slate-50 rounded-lg transition-all"
           href="create-trip.html">
            <span class="material-symbols-outlined">add_circle</span>
            <span>Plan New Trip</span>
        </a>

        <!-- Currency Converter -->
        <a class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:text-blue-500 hover:bg-slate-50 rounded-lg transition-all"
           href="currency-converter.html">
            <span class="material-symbols-outlined">currency_exchange</span>
            <span>Currency Converter</span>
        </a>

        <!-- HOLIDAY (ACTIVE PAGE — ONLY DIFFERENCE) -->
        <a class="flex items-center gap-3 px-4 py-3 text-blue-600 bg-blue-50 rounded-lg font-bold border-l-4 border-blue-600"
           href="holiday.html">
            <span class="material-symbols-outlined">event</span>
            <span>Holiday Explorer</span>
        </a>

    </nav>

    <button onclick="logout()" class="flex items-center gap-3 px-4 py-3 text-red-500 hover:bg-red-50 rounded-lg transition-all mt-4">
        <span class="material-symbols-outlined">logout</span>
        <span>Logout</span>
    </button>

</aside>

<!-- MAIN CONTENT -->
<main class="ml-64 flex-1 flex flex-col min-h-screen">

    <header class="sticky top-0 z-40 w-full px-8 py-3 bg-white/80 backdrop-blur-md border-b border-slate-200 shadow-sm">
        <h2 class="font-bold text-slate-400">Travel Tools</h2>
    </header>

    <section class="max-w-5xl mx-auto py-12 px-8">
        <div class="mb-12">
            <span class="text-blue-600 font-semibold uppercase text-sm">Holiday Tool</span>
            <h1 class="text-5xl font-bold mt-2">Holiday Explorer</h1>
            <p class="text-slate-500 text-lg mt-4">
                Check public holidays by country before planning your trip.
            </p>
        </div>

        <div class="bg-white rounded-[1.5rem] p-8 adventure-shadow border border-slate-100">
            <div class="grid md:grid-cols-2 gap-6">

                <div class="space-y-2 relative">
                    <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider">
                        Select Country
                    </label>

                    <div id="countrySearch"
                        class="w-full px-4 py-3 rounded-lg border border-slate-200 bg-slate-50 cursor-pointer hover:bg-slate-100 transition flex items-center gap-3">
                        <span class="text-slate-400">Select country</span>
                    </div>

                    <input type="hidden" id="country"/>

                    <div id="countryList"
                        class="absolute z-50 w-full bg-white border rounded-lg mt-2 hidden max-h-60 overflow-y-auto adventure-shadow">
                    </div>
                </div>

                <div class="flex items-end">
                    <button
                        type="button"
                        onclick="getHolidays()"
                        class="w-full py-3 bg-[#0058bc] text-white rounded-xl font-semibold hover:bg-[#004493] transition-all adventure-shadow">
                        Search Holidays
                    </button>
                </div>

            </div>
        </div>
    </div>

</section>

<!-- RESULT AREA OUTSIDE CENTER CONTAINER -->
<div id="resultBox"
     class="hidden w-full px-8 mt-10">

    <div class="max-w-5xl mx-auto">

        <h2 id="resultTitle"
            class="text-2xl font-bold text-[#1a1b1f] mb-6">
        </h2>

        <div id="resultGrid"
            class="grid md:grid-cols-2 lg:grid-cols-3 gap-5">
        </div>

    </div>

</div>

</main>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/country-list.js"></script>
<script src="js/holiday.js"></script>

<script>
    checkAuth();
</script>

</body>
</html>
