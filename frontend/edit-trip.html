<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Edit Trip - SmartTravel</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #faf9fe; }
    </style>
</head>
<body class="flex">
    <aside class="fixed left-0 top-0 h-screen w-64 border-r bg-white border-slate-200 shadow-xl shadow-blue-500/5 flex flex-col p-4 gap-2 z-50">
        <div class="mb-8 px-4 py-6">
            <h1 class="text-2xl font-black text-blue-600">SmartTravel</h1>
            <p class="text-sm text-slate-400">Smart Planner</p>
        </div>
        <nav class="flex flex-col gap-1 grow">
            <a class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:text-blue-500 hover:bg-slate-50 rounded-lg transition-all" href="dashboard.html">
                <span class="material-symbols-outlined">home</span>
                <span>My Trips</span>
            </a>
            <a class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:text-blue-500 hover:bg-slate-50 rounded-lg transition-all" href="create-trip.html">
                <span class="material-symbols-outlined">add_circle</span>
                <span>Plan New Trip</span>
            </a>
            <a class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:text-blue-500 hover:bg-slate-50 rounded-lg transition-all" href="currency-converter.html">
                <span class="material-symbols-outlined">currency_exchange</span>
                <span>Currency Converter</span>
            </a>
        </nav>
        <button onclick="logout()" class="flex items-center gap-3 px-4 py-3 text-red-500 hover:bg-red-50 rounded-lg transition-all mt-4">
                <span class="material-symbols-outlined">logout</span>
                <span>Logout</span>
        </button>
    </aside>

    <main class="flex-1 ml-64 p-12">
        <div class="max-w-2xl mx-auto">
            <header class="mb-10">
                <h1 class="text-3xl font-black text-slate-900">Edit Your Trip</h1>
                <p class="text-slate-500">Update your travel details and preferences.</p>
            </header>

            <form id="editTripForm" class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-100 space-y-6">
                <div class="grid grid-cols-2 gap-6">
                    <div class="col-span-2">
                        <label class="block text-sm font-bold text-slate-700 mb-2">Trip Title</label>
                        <input type="text" id="editTitle" required class="w-full rounded-xl border-slate-200 focus:ring-blue-500" placeholder="e.g. Summer in Tokyo">
                    </div>
                    <div class="col-span-2">
                        <label class="block text-sm font-bold text-slate-700 mb-2">Destination</label>
                        <input type="text" id="editDestination" required class="w-full rounded-xl border-slate-200" placeholder="Where to?">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Budget Per Person (RM)</label>
                        <input type="number" id="editBudget" required class="w-full rounded-xl border-slate-200">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Preferences</label>
                        <input type="text" id="editPreferences" class="w-full rounded-xl border-slate-200" placeholder="food, hiking, beach">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">Start Date</label>
                        <input type="date" id="editStartDate" required class="w-full rounded-xl border-slate-200">
                    </div>
                    <div>
                        <label class="block text-sm font-bold text-slate-700 mb-2">End Date</label>
                        <input type="date" id="editEndDate" required class="w-full rounded-xl border-slate-200">
                    </div>
                </div>

                <div class="pt-4 flex gap-4">
                    <button type="submit" class="flex-1 bg-blue-600 text-white font-bold py-4 rounded-xl hover:bg-blue-700 transition-all">Save Changes</button>
                    <button type="button" onclick="history.back()" class="px-8 py-4 bg-slate-100 text-slate-600 font-bold rounded-xl hover:bg-slate-200 transition-all">Cancel</button>
                </div>
            </form>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/trips.js"></script>
</body>
</html>
