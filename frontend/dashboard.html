<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Dashboard - Smart Travel Planner</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "primary": "#0058bc",
                        "secondary-container": "#fe9400",
                        "background": "#faf9fe",
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #faf9fe; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .sidebar-shadow { box-shadow: 10px 0 30px -15px rgba(0, 88, 188, 0.05); }
        .trip-card:hover { transform: translateY(-5px); transition: all 0.3s ease; }
    </style>
</head>

<body class="bg-background text-slate-900 min-h-screen flex">
    
    <nav class="fixed left-0 top-0 h-screen w-64 border-r border-slate-200 bg-white sidebar-shadow z-50 flex flex-col p-4 gap-2">
        <div class="mb-8 px-4 py-6">
            <h1 class="text-2xl font-black text-blue-600">SmartTravel</h1>
            <p class="text-sm text-slate-400">Smart Planner</p>
        </div>
        
        <div class="flex flex-col gap-1 grow">
            <a class="flex items-center gap-3 px-4 py-3 text-blue-600 bg-blue-50 rounded-lg font-bold border-l-4 border-blue-600 transition-all" href="dashboard.html">
                <span class="material-symbols-outlined">home</span>
                <span>My Trips</span>
            </a>
            <a class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:text-blue-500 hover:bg-slate-50 rounded-lg transition-all" href="create-trip.html">
                <span class="material-symbols-outlined">add_circle</span>
                <span>Plan New Trip</span>
            </a>
            <a class="flex items-center gap-3 px-4 py-3 text-slate-500 hover:text-blue-500 hover:bg-slate-50 rounded-lg transition-all" href="currency-converter.html">
                <span class="material-symbols-outlined">currency_exchange</span>
                <span>Currency Converter</span>
            </a>
        </div>

        <!-- <button onclick="window.location.href='create-trip.html'" class="mt-auto bg-[#fe9400] text-white font-bold py-4 rounded-xl shadow-lg flex items-center justify-center gap-2 hover:scale-105 transition-transform active:scale-95">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">auto_awesome</span>
            Magic Plan
        </button> -->
        <button onclick="logout()" class="flex items-center gap-3 px-4 py-3 text-red-500 hover:bg-red-50 rounded-lg transition-all mt-4">
                <span class="material-symbols-outlined">logout</span>
                <span>Logout</span>
        </button>
    </nav>

    <main class="ml-64 flex-1 flex flex-col min-h-screen">
        
        <header class="sticky top-0 z-40 bg-white/80 backdrop-blur-md px-8 py-3 flex justify-between items-center border-b border-slate-200">
            <div class="relative w-full max-w-md">
                <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">search</span>
                <input class="w-full bg-slate-100 border-none rounded-full pl-10 pr-4 py-2 text-sm focus:ring-2 focus:ring-blue-500/20" placeholder="Search your trips..." type="text"/>
            </div>
            
            <a href="profile.html" class="flex items-center gap-4" title="Profile">
                <div id="userProfileIcon" class="h-10 w-10 rounded-full bg-blue-100 flex items-center justify-center border-2 border-white shadow-sm overflow-hidden text-blue-600 font-bold uppercase cursor-pointer">
                    U
                </div>
            </a>
        </header>

        <div class="p-8 space-y-12">
            
            <section class="flex justify-between items-end">
                <div>
                    <h2 id="welcomeName" class="text-4xl font-bold tracking-tight text-slate-900">Welcome back!</h2>
                    <p class="text-lg text-slate-500 mt-2">Ready for your next trip?</p>
                </div>
                <button onclick="window.location.href='create-trip.html'" class="bg-blue-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-blue-700 transition-all flex items-center gap-2">
                    <span class="material-symbols-outlined">add</span> Create New Trip
                </button>
            </section>

            <section class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="bg-white p-6 rounded-[1.5rem] shadow-sm border border-slate-100 flex items-center gap-4">
                    <div class="p-4 bg-blue-50 rounded-xl text-blue-600"><span class="material-symbols-outlined">flight_takeoff</span></div>
                    <div><p class="text-xs text-slate-400 uppercase tracking-widest font-bold">Planned Trips</p><p id="tripCount" class="text-2xl font-bold">0</p></div>
                </div>
                <!-- <div class="bg-white p-6 rounded-[1.5rem] shadow-sm border border-slate-100 flex items-center gap-4">
                    <div class="p-4 bg-orange-50 rounded-xl text-orange-600"><span class="material-symbols-outlined">explore</span></div>
                    <div><p class="text-xs text-slate-400 uppercase tracking-widest font-bold">Status</p><p class="text-2xl font-bold text-green-500">Explorer</p></div>
                </div> -->
            </section>

            <section>
                <h3 class="text-2xl font-bold mb-6">Upcoming Trips</h3>
                <div id="tripContainer" class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="col-span-full py-20 text-center text-slate-400">
                        <div class="animate-spin inline-block mb-4 text-blue-600">⌛</div>
                        <p>Fetching your trips...</p>
                    </div>
                </div>
            </section>

        </div>

        <footer class="w-full py-8 mt-auto border-t border-slate-200 bg-white">
            <div class="flex flex-col md:flex-row justify-between items-center px-8 max-w-7xl mx-auto gap-4">
                <p class="text-xs text-slate-400">© 2026 Smart Travel Planner.</p>
                <div class="flex gap-6">
                    <a class="text-xs text-slate-400 hover:text-blue-500" href="#">Privacy</a>
                    <a class="text-xs text-slate-400 hover:text-blue-500" href="#">Terms</a>
                </div>
            </div>
        </footer>
    </main>

    <script src="js/api.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/trips.js"></script>
    <script>
        // Check for Auth immediately
        checkAuth();

        // Update the name dynamically from LocalStorage
        const user = JSON.parse(localStorage.getItem('user'));
        if (user && user.name) {
            document.getElementById('welcomeName').innerText = `Welcome back, ${user.name}!`;
            document.getElementById('userProfileIcon').innerText = user.name.charAt(0);
        }
    </script>
</body>
</html>
